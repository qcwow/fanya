 # 开发环境配置
springdoc:
  paths-to-match: /api/**
  swagger-ui:
    operations-sorter: alpha
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fanya
    username: root
    password: "******"
    driver-class-name: com.mysql.cj.jdbc.Driver
  security:
    jwt:
      key: 'abcdefghijklmn'
      expire: 72
      limit:
        base: 10
        upgrade: 300
        frequency: 30
    filter:
      order: -100
  web:
    verify:
      mail-limit: 60
    flow:
      period: 3
      limit: 50
      block: 30
    cors:
      origin: '*'
      credentials: false
      methods: '*'

# API 安全配置
api:
  security:
    static-key: 'edu_platform_secret_key_2024'  # 生产环境请使用环境变量
    signature-expire-seconds: 300
